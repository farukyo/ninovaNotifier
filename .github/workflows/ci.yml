name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run Secret scan
        run: uv run detect-secrets scan --baseline .secrets.baseline

  patch-and-lock:
    name: Patch bump & lock sync
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Bump patch version
        run: uv run python scripts/bump_version.py --bump patch --write

      - name: Sync lock file
        run: uv lock

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping."
            exit 0
          fi
          NEW_VERSION=$(uv run python scripts/bump_version.py --current)
          git commit -m "chore(release): v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(uv run python scripts/bump_version.py --current)
          gh release create "v$NEW_VERSION" \
            --title "v$NEW_VERSION" \
            --generate-notes

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: patch-and-lock
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git pull origin main
            /home/faruk/.local/bin/uv sync
            pm2 restart ninova-bot
