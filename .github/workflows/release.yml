name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        default: patch
        type: choice
        options:
          - minor
          - major
      version:
        description: "Optional exact version override (e.g. 0.3.0)"
        required: false
        type: string
      release_notes:
        description: "Kullanıcıya gönderilecek changelog (boş bırakırsan varsayılan mesaj gider)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Bump, Tag, Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve next version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEW_VERSION=$(uv run python scripts/bump_version.py --set-version "${{ github.event.inputs.version }}" --write)
          else
            NEW_VERSION=$(uv run python scripts/bump_version.py --bump "${{ github.event.inputs.bump }}" --write)
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate code quality
        run: |
          uv sync --dev
          uv run ruff check .
          uv run ruff format --check .

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "No version change detected; skipping commit and tag."
            exit 1
          fi
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Announce on Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            NOTES="Bu sürümde genel iyileştirmeler ve hata düzeltmeleri yapıldı."
          fi

          BROADCAST_TEXT="$(printf '🆕 <b>ninovaNotifier %s</b>\n\n%s\n\n🔗 <a href="%s">Detaylar</a>' "$TAG" "$NOTES" "$RELEASE_URL")"
          MESSAGE="__release__ ${BROADCAST_TEXT}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true"
